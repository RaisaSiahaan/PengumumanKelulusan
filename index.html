<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengumuman Kelulusan SMPK IPEKA Pluit</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    color:white;
}

/* CONTAINER */

.container{
    width:100%;
    max-width:530px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* LOGO */

.logo{
    width:110px;
    height:110px;
    margin:auto;
    margin-bottom:20px;
    border-radius:50%;
    background:linear-gradient(45deg,#2563eb,#38bdf8);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    padding:15px;
}

.logo img{
    width:100%;
    object-fit:contain;
}

/* TITLE */

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:32px;
}

.desc{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:35px;
    line-height:1.7;
}

/* FORM */

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#e2e8f0;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    font-size:16px;
}

input:focus{
    border:2px solid #38bdf8;
}

/* BUTTON */

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(45deg,#2563eb,#38bdf8);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(56,189,248,0.3);
}

/* LOADING */

.loading{
    display:none;
    text-align:center;
    margin-top:20px;
    color:#cbd5e1;
}

/* ERROR */

.error{
    display:none;
    margin-top:20px;
    padding:15px;
    border-radius:14px;
    background:rgba(239,68,68,0.15);
    border:1px solid #ef4444;
    text-align:center;
}

/* RESULT */

.result{
    display:none;
    margin-top:30px;
    background:#0f172a;
    padding:25px;
    border-radius:20px;
    animation:fade 0.5s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.data{
    margin-bottom:15px;
    line-height:1.8;
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding-bottom:10px;
}

/* STATUS */

.status-lulus{
    margin-top:25px;
    padding:25px;
    border-radius:18px;
    background:rgba(34,197,94,0.15);
    border:1px solid #22c55e;
    text-align:center;
}

.status-tidak{
    margin-top:25px;
    padding:25px;
    border-radius:18px;
    background:rgba(239,68,68,0.15);
    border:1px solid #ef4444;
    text-align:center;
}

.status-title{
    font-size:34px;
    font-weight:bold;
    margin-bottom:12px;
}

/* FOOTER */

.footer{
    margin-top:25px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
}

/* RESPONSIVE */

@media(max-width:600px){

    .container{
        padding:25px;
    }

    h1{
        font-size:27px;
    }

}

</style>
</head>
<body>

<div class="container">

    <!-- LOGO -->

    <div class="logo">

        <img src="https://ipeka.org/wp-content/uploads/2025/06/IPEKA-Christian-School-White-01-300x168.png">

    </div>

    <!-- TITLE -->

    <h1>Pengumuman Kelulusan</h1>

    <p class="desc">
        SMPK IPEKA Pluit<br>
        Tahun Ajaran 2025/2026
    </p>

    <!-- FORM -->

    <div class="form-group">
        <label>Nama Lengkap</label>

        <input
        type="text"
        id="nama"
        placeholder="Masukkan nama lengkap">
    </div>

    <div class="form-group">
        <label>Tanggal Lahir</label>

        <input
        type="date"
        id="tgl">
    </div>

    <button onclick="cekKelulusan()">
        Login & Lihat Hasil
    </button>

    <!-- LOADING -->

    <div class="loading" id="loading">
        Memeriksa data...
    </div>

    <!-- ERROR -->

    <div class="error" id="error">
        Data siswa tidak ditemukan.
    </div>

    <!-- RESULT -->

    <div class="result" id="result">

        <div class="data">
            <strong>Nama &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;:</strong>
            <span id="hasilNama"></span>
        </div>

        <div class="data">
            <strong>Tanggal Lahir &nbsp;:</strong>
            <span id="hasilTgl"></span>
        </div>

        <div class="data">
            <strong>NIS &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;:</strong>
            <span id="hasilNis"></span>
        </div>

        <div class="data">
            <strong>Kelas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;:</strong>
            <span id="hasilKelas"></span>
        </div>

        <div class="data">
            <strong>Tahun Ajaran &nbsp;&nbsp;:</strong>
            2025/2026
        </div>

        <div id="statusBox"></div>

    </div>

    <!-- FOOTER -->

    <div class="footer">
        © 2026 SMPK IPEKA Pluit
    </div>

</div>

<script>

/* =========================
   GOOGLE APPS SCRIPT URL
========================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbzu2D7Rv4SvrGUCx9G8A0w0JjZIc_0kkubKGBAY2XAvzPMdzTSOMPM2IUlOEvMjRsCOSg/exec";

/* =========================
   FUNCTION LOGIN
========================= */

async function cekKelulusan(){

    const nama =
    document.getElementById("nama")
    .value
    .trim();

    const tgl =
    document.getElementById("tgl")
    .value;

    const result =
    document.getElementById("result");

    const error =
    document.getElementById("error");

    const loading =
    document.getElementById("loading");

    /* VALIDASI */

    if(nama === "" || tgl === ""){

        alert("Lengkapi data terlebih dahulu.");

        return;

    }

    /* RESET */

    result.style.display = "none";
    error.style.display = "none";
    loading.style.display = "block";

    try{

        /* URL FETCH */

        const url =
        API_URL +
        "?nama=" +
        encodeURIComponent(nama) +
        "&tgl=" +
        encodeURIComponent(tgl);

        /* FETCH DATA */

        const response =
        await fetch(url);

        const hasil =
        await response.json();

        loading.style.display = "none";

        /* DATA TIDAK DITEMUKAN */

        if(hasil.status === "NOT_FOUND"){

            error.style.display = "block";

        }

        /* DATA DITEMUKAN */

        else{

            result.style.display = "block";

            document.getElementById("hasilNama")
            .innerText = hasil.nama;

            document.getElementById("hasilTgl")
            .innerText = hasil.tgl;

            document.getElementById("hasilNis")
            .innerText = hasil.nis;

            document.getElementById("hasilKelas")
            .innerText = hasil.kelas;

            const statusBox =
            document.getElementById("statusBox");

            /* STATUS LULUS */

            if(hasil.status === "LULUS"){

                statusBox.innerHTML = `

                <div class="status-lulus">

                    <div class="status-title">
                        🎉 LULUS
                    </div>

                    <p>
                        Selamat! Anda dinyatakan
                        <b>LULUS</b> dari
                        SMPK IPEKA Pluit.
                    </p>

                </div>

                `;

            }

            /* STATUS TIDAK LULUS */

            else{

                statusBox.innerHTML = `

                <div class="status-tidak">

                    <div class="status-title">
                        ❌ TIDAK LULUS
                    </div>

                    <p>
                        Tetap semangat dan terus berjuang.
                    </p>

                </div>

                `;

            }

        }

    }

    catch(err){

        loading.style.display = "none";

        alert("Gagal terhubung ke server.");

        console.log(err);

    }

}

</script>

</body>
</html>
